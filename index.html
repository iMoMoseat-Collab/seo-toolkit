<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SEO Toolkit — Professional Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#05070a;font-family:'Noto Sans Thai',system-ui,sans-serif}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState } = React;


// ─── Design System ────────────────────────────────────────────────────────────
const C = {
  bg: "#05070a", surface: "#0d1117", card: "#111827",
  border: "#1f2937", borderLight: "#374151",
  text: "#f1f5f9", textMuted: "#6b7280", textDim: "#374151",
  primary: "#6366f1", primaryGlow: "rgba(99,102,241,0.3)",
  green: "#10b981", yellow: "#f59e0b", red: "#ef4444",
  blue: "#3b82f6",
};

const inp = {
  width:"100%", background:C.surface, border:`1px solid ${C.border}`,
  borderRadius:8, padding:"11px 14px", color:C.text, fontSize:14,
  outline:"none", boxSizing:"border-box", fontFamily:"inherit",
  transition:"border-color 0.2s",
};
const lbl = {
  display:"block", fontSize:10, fontWeight:700, color:C.textMuted,
  marginBottom:6, letterSpacing:"0.1em", textTransform:"uppercase",
};
const crd = {
  background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:"18px 20px",
};

function Btn({ onClick, label, loading=false, variant="primary" }) {
  const bg = variant==="primary"
    ? `linear-gradient(135deg,${C.primary},#8b5cf6)`
    : variant==="success" ? `linear-gradient(135deg,#059669,${C.green})`
    : C.surface;
  return (
    <button onClick={onClick} disabled={loading} style={{
      background: loading ? C.border : bg,
      color: C.text, border: variant==="ghost" ? `1px solid ${C.border}` : "none",
      borderRadius:8, padding:"11px 22px", fontSize:13, fontWeight:700,
      cursor: loading?"not-allowed":"pointer", opacity: loading?0.6:1,
      boxShadow: variant==="primary"?`0 4px 15px ${C.primaryGlow}`:"none",
      transition:"all 0.15s", display:"inline-flex", alignItems:"center", gap:6,
    }}>
      {loading && <span style={{ width:12, height:12, border:"2px solid #fff4", borderTop:`2px solid ${C.text}`, borderRadius:"50%", animation:"spin .7s linear infinite", display:"inline-block" }}/>}
      {label}
    </button>
  );
}

function Tag({ text, color=C.primary }) {
  return <span style={{ background:color+"20", color, fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:99, border:`1px solid ${color}30`, letterSpacing:"0.05em" }}>{text}</span>;
}

function Bar({ label, score }) {
  const color = score>=7?C.green:score>=5?C.yellow:C.red;
  return (
    <div style={{ marginBottom:12 }}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
        <span style={{ fontSize:12, color:C.textMuted }}>{label}</span>
        <span style={{ fontSize:12, fontWeight:800, color }}>{score}/10</span>
      </div>
      <div style={{ background:C.surface, borderRadius:99, height:6 }}>
        <div style={{ width:`${score*10}%`, height:"100%", background:color, borderRadius:99, transition:"width 1.2s ease", boxShadow:`0 0 8px ${color}66` }}/>
      </div>
    </div>
  );
}

// ─── HTML Analyzer Engine ─────────────────────────────────────────────────────
function analyzeHTML(html, kw="") {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const kwLow = kw.toLowerCase().trim();
  const R = {};

  const title = doc.querySelector("title")?.textContent?.trim()||"";
  const tLen = title.length;
  const tKw = kwLow && title.toLowerCase().includes(kwLow);
  R.title = {
    label:"🏷️ Title Tag",
    score: !title?0:tLen<10?2:tLen>70?5:tLen>=50&&tLen<=60?(tKw||!kwLow?10:7):(tKw||!kwLow?7:5),
    detail: !title?"ไม่มี title tag":`"${title.slice(0,55)}${title.length>55?"...":""}" — ${tLen} ตัว${tLen<50?" (สั้นเกิน)":tLen>60?" (ยาวเกิน)":" ✓"}${kwLow?(tKw?" · keyword ✓":" · ไม่มี keyword"):""}`,
    fix: !title?"เพิ่ม <title> ใน <head>":tLen<50?"ยืด title ให้ 50-60 ตัว":tLen>60?"ตัดให้เหลือ 50-60 ตัว":!tKw&&kwLow?`ใส่ "${kw}" ไว้ต้น title`:null,
  };

  const meta = doc.querySelector('meta[name="description"]')?.getAttribute("content")?.trim()||"";
  const mLen = meta.length;
  const mKw = kwLow && meta.toLowerCase().includes(kwLow);
  R.meta = {
    label:"📝 Meta Description",
    score: !meta?0:mLen<50?3:mLen>170?5:mLen>=150&&mLen<=160?(mKw||!kwLow?10:7):(mKw||!kwLow?7:5),
    detail: !meta?"ไม่มี meta description":`${mLen} ตัว${mLen<150?" (ควร 150-160)":mLen>160?" (ยาวเกิน)":" ✓"}${kwLow?(mKw?" · keyword ✓":" · ไม่มี keyword"):""}`,
    fix: !meta?'เพิ่ม <meta name="description">':mLen<150?"ยืด meta ให้ 150-160 ตัว + CTA":mLen>160?"ตัดให้เหลือ 150-160 ตัว":!mKw&&kwLow?`ใส่ "${kw}" ใน meta`:null,
  };

  const h1s = doc.querySelectorAll("h1");
  const h1t = Array.from(h1s).map(h=>h.textContent.trim()).join(" / ");
  const h1Kw = kwLow && h1t.toLowerCase().includes(kwLow);
  R.h1 = {
    label:"📐 H1 Heading",
    score: h1s.length===0?0:h1s.length===1?(h1Kw||!kwLow?10:7):h1s.length===2?6:3,
    detail: h1s.length===0?"ไม่มี H1":h1s.length===1?`"${h1t.slice(0,50)}" ✓${kwLow?(h1Kw?" · keyword ✓":" · ไม่มี keyword"):""}`:` มี ${h1s.length} H1 (ควรมีแค่ 1)`,
    fix: h1s.length===0?"เพิ่ม <h1> ที่มี keyword หลัก":h1s.length>1?"ลด H1 ให้เหลือ 1":!h1Kw&&kwLow?`ใส่ "${kw}" ใน H1`:null,
  };

  const h2=doc.querySelectorAll("h2").length, h3=doc.querySelectorAll("h3").length;
  R.headings = {
    label:"📑 Headings H2/H3",
    score: h2===0?3:h2>=2&&h2<=8?(h3>0?10:8):h2===1?6:7,
    detail: `H2: ${h2} · H3: ${h3}${h2>=2?" ✓":h2===1?" (ควรมี 2+)":" (ไม่มี H2)"}`,
    fix: h2===0?"เพิ่ม H2 แบ่งหมวดเนื้อหา":h2===1?"เพิ่ม H2 อีกอย่างน้อย 1":h3===0?"เพิ่ม H3 แบ่งรายละเอียด":null,
  };

  const imgs=doc.querySelectorAll("img");
  const noAlt=Array.from(imgs).filter(i=>!i.getAttribute("alt")||!i.getAttribute("alt").trim()).length;
  R.images = {
    label:"🖼️ Image Alt Text",
    score: imgs.length===0?7:noAlt===0?10:noAlt/imgs.length<=0.2?7:noAlt/imgs.length<=0.5?5:2,
    detail: imgs.length===0?"ไม่มีรูปในหน้า":noAlt===0?`${imgs.length} รูป มี alt ครบ ✓`:`${noAlt}/${imgs.length} รูปไม่มี alt`,
    fix: noAlt>0?`เพิ่ม alt text ให้ ${noAlt} รูป`:null,
  };

  const links=doc.querySelectorAll("a[href]");
  const intLinks=Array.from(links).filter(a=>{const h=a.getAttribute("href")||"";return h.startsWith("/")||h.startsWith("#")||!h.startsWith("http");}).length;
  R.links = {
    label:"🔗 Internal Links",
    score: intLinks===0?2:intLinks>=3?10:intLinks>=1?7:4,
    detail: `${intLinks} internal · ${links.length-intLinks} external${intLinks>=3?" ✓":intLinks===0?" (ไม่มีเลย)":" (ควรมีมากกว่านี้)"}`,
    fix: intLinks===0?"เพิ่ม link ไปหน้าบริการ เกี่ยวกับเรา ติดต่อ":intLinks<3?"เพิ่ม internal link อีก":null,
  };

  const hasVP=!!doc.querySelector('meta[name="viewport"]');
  const hasCan=!!doc.querySelector('link[rel="canonical"]');
  const hasSchema=!!doc.querySelector('script[type="application/ld+json"]');
  const hasOG=!!doc.querySelector('meta[property^="og:"]');
  R.tech = {
    label:"⚡ Technical",
    score: Math.min((hasVP?3:0)+(hasCan?3:0)+(hasSchema?2:0)+(hasOG?2:0),10),
    detail: `Viewport ${hasVP?"✓":"✗"} · Canonical ${hasCan?"✓":"✗"} · Schema ${hasSchema?"✓":"✗"} · OG ${hasOG?"✓":"✗"}`,
    fix: !hasVP?'เพิ่ม <meta name="viewport">':!hasCan?"เพิ่ม canonical tag":!hasSchema?"เพิ่ม JSON-LD Schema":!hasOG?"เพิ่ม og:title og:description":null,
  };

  if (kwLow) {
    const body=doc.body?.textContent?.toLowerCase()||"";
    const wc=body.split(/\s+/).filter(w=>w.length>1).length;
    const cnt=(body.match(new RegExp(kwLow.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g"))||[]).length;
    const pct=wc>0?((cnt/wc)*100).toFixed(2):0;
    const p=parseFloat(pct);
    R.kw = {
      label:"🔑 Keyword Density",
      score: cnt===0?0:p>=1&&p<=3?10:p<1?6:p<=5?7:3,
      detail: cnt===0?`"${kw}" ไม่พบเลย`:`"${kw}" ${cnt} ครั้ง = ${pct}%${p>=1&&p<=3?" ✓":p>3?" (มากเกิน)":" (น้อยเกิน)"}`,
      fix: cnt===0?`ใส่ "${kw}" ในเนื้อหา H2 และ alt text`:p<1?"เพิ่ม keyword ให้มากขึ้น":p>3?"ลดลง ใช้คำพ้องความหมาย":null,
    };
  }

  const scores=Object.values(R).map(r=>r.score);
  return { results:R, overall:Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) };
}

// ─── 1. Keyword Research ──────────────────────────────────────────────────────
function KeywordResearch() {
  const [inputs,setInputs]=useState(["","","","",""]);
  const kws=inputs.map(k=>k.trim()).filter(Boolean);
  const update=(i,v)=>{const n=[...inputs];n[i]=v;setInputs(n);};
  const trendsUrl=`https://trends.google.com/trends/explore?q=${kws.map(k=>encodeURIComponent(k)).join(",")}&geo=TH&hl=th&date=today%203-m`;
  return (
    <div>
      <p style={{color:C.textMuted,fontSize:13,marginBottom:18}}>ใส่ keyword สูงสุด 5 คำ → เปิด Google Trends เปรียบเทียบทันที</p>
      {inputs.map((v,i)=>(
        <div key={i} style={{display:"flex",gap:8,marginBottom:8}}>
          <input value={v} onChange={e=>update(i,e.target.value)} placeholder={["เช่น ฝังเข็ม กรุงเทพ","เช่น แพทย์แผนจีน","เช่น นวดกดจุด","keyword 4","keyword 5"][i]} style={inp}/>
          {v.trim()&&<a href={`https://trends.google.com/trends/explore?q=${encodeURIComponent(v.trim())}&geo=TH&hl=th`} target="_blank" rel="noreferrer" style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"0 14px",color:C.textMuted,textDecoration:"none",display:"flex",alignItems:"center",fontSize:18,flexShrink:0}}>📈</a>}
        </div>
      ))}
      <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
        {kws.length>0&&<a href={trendsUrl} target="_blank" rel="noreferrer" style={{background:`linear-gradient(135deg,${C.primary},#8b5cf6)`,color:"#fff",textDecoration:"none",borderRadius:8,padding:"11px 22px",fontSize:13,fontWeight:700,boxShadow:`0 4px 15px ${C.primaryGlow}`}}>📈 เปรียบเทียบ {kws.length} keyword ใน Trends</a>}
        <a href="https://trends.google.com/trends/explore?geo=TH&hl=th" target="_blank" rel="noreferrer" style={{background:C.surface,border:`1px solid ${C.border}`,color:C.textMuted,textDecoration:"none",borderRadius:8,padding:"11px 18px",fontSize:13,fontWeight:600}}>🌐 เปิด Trends ไทย</a>
      </div>
      {kws.length>0&&<div style={{...crd,marginTop:16}}>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:10,letterSpacing:"0.08em"}}>KEYWORDS TO COMPARE</div>
        {kws.map((kw,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:i<kws.length-1?`1px solid ${C.border}`:"none"}}>
            <span style={{fontSize:13,color:C.text,fontWeight:600}}>{i+1}. {kw}</span>
            <a href={`https://trends.google.com/trends/explore?q=${encodeURIComponent(kw)}&geo=TH&hl=th`} target="_blank" rel="noreferrer" style={{background:C.surface,border:`1px solid ${C.border}`,color:C.primary,textDecoration:"none",borderRadius:6,padding:"4px 12px",fontSize:11,fontWeight:700}}>Trends →</a>
          </div>
        ))}
        <div style={{marginTop:12,background:"#10b98112",border:"1px solid #10b98130",borderRadius:8,padding:"10px 14px",fontSize:12,color:C.green,lineHeight:1.8}}>
          <b>วิธีอ่าน Trends:</b> คะแนน 100 = ช่วงที่ค้นหาเยอะสุด · เส้นสูง = กำลัง hot · เปรียบเทียบหลายเส้น = เห็นชัดว่าอันไหนชนะ
        </div>
      </div>}
    </div>
  );
}

// ─── 2. SEO Analyzer ─────────────────────────────────────────────────────────
function AccordionCard({data}) {
  const {label,score,detail,fix}=data;
  const color=score>=7?C.green:score>=5?C.yellow:C.red;
  const [open,setOpen]=useState(false);
  return (
    <div style={{background:C.surface,border:`1px solid ${color}25`,borderRadius:10,overflow:"hidden",marginBottom:8}}>
      <div onClick={()=>setOpen(o=>!o)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
        <div style={{minWidth:36,height:36,borderRadius:8,background:color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color}}>{score}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:4}}>{label}</div>
          <div style={{background:C.card,borderRadius:99,height:5}}>
            <div style={{width:`${score*10}%`,height:"100%",background:color,borderRadius:99,transition:"width 1s",boxShadow:`0 0 6px ${color}88`}}/>
          </div>
        </div>
        <span style={{color:C.textMuted,fontSize:11}}>{open?"▲":"▼"}</span>
      </div>
      {open&&<div style={{padding:"0 16px 14px",borderTop:`1px solid ${C.border}`}}>
        <div style={{fontSize:13,color:C.textMuted,lineHeight:1.7,marginTop:10}}>{detail}</div>
        {fix&&<div style={{background:`${C.primary}12`,border:`1px solid ${C.primary}25`,borderRadius:7,padding:"9px 12px",fontSize:12,color:C.primary,lineHeight:1.6,marginTop:8}}>💡 {fix}</div>}
      </div>}
    </div>
  );
}
function SEOAnalyzer() {
  const [html,setHtml]=useState(""); const [kw,setKw]=useState(""); const [res,setRes]=useState(null); const [err,setErr]=useState("");
  const run=()=>{setErr("");if(!html.trim()){setErr("กรุณาวาง HTML ก่อน");return;}try{setRes(analyzeHTML(html,kw));}catch(e){setErr(e.message);}};
  const qw=res?Object.values(res.results).filter(r=>r.score<7&&r.fix).sort((a,b)=>a.score-b.score).slice(0,3):[];
  const oc=res?(res.overall>=7?C.green:res.overall>=5?C.yellow:C.red):C.primary;
  return (
    <div>
      <p style={{color:C.textMuted,fontSize:13,marginBottom:18}}>วาง HTML → วิเคราะห์จาก DOM จริง ไม่ใช้ AI</p>
      <label style={lbl}>วาง HTML * <span style={{fontWeight:400,textTransform:"none"}}>(Ctrl+U → Copy all)</span></label>
      <textarea value={html} onChange={e=>setHtml(e.target.value)} placeholder="วาง HTML ที่นี่..." style={{...inp,height:130,fontFamily:"monospace",fontSize:12,marginBottom:10}}/>
      <label style={lbl}>Target Keyword</label>
      <input value={kw} onChange={e=>setKw(e.target.value)} placeholder="เช่น แพทย์แผนจีน" style={{...inp,marginBottom:18}}/>
      {err&&<div style={{color:C.red,fontSize:12,marginBottom:10}}>❌ {err}</div>}
      <Btn onClick={run} label="🔎 วิเคราะห์ SEO"/>
      {res&&<>
        <div style={{textAlign:"center",padding:"22px 0 14px"}}>
          <div style={{fontSize:10,color:C.textMuted,letterSpacing:"0.12em",marginBottom:8}}>SEO SCORE</div>
          <div style={{fontSize:76,fontWeight:900,color:oc,lineHeight:1,textShadow:`0 0 30px ${oc}66`}}>{res.overall}</div>
          <div style={{fontSize:14,color:C.textMuted}}>/10 — <span style={{color:oc,fontWeight:700}}>{res.overall>=7?"ดี":res.overall>=5?"พอใช้":"ต้องปรับ"}</span></div>
        </div>
        {qw.length>0&&<div style={{background:"#f59e0b10",border:"1px solid #f59e0b25",borderRadius:10,padding:"14px 16px",marginBottom:14}}>
          <div style={{fontSize:11,color:C.yellow,fontWeight:700,marginBottom:10,letterSpacing:"0.08em"}}>⚡ แก้ก่อนเลย</div>
          {qw.map((item,i)=><div key={i} style={{marginBottom:8,paddingLeft:10,borderLeft:`2px solid ${C.yellow}`}}>
            <div style={{fontSize:12,fontWeight:700,color:C.yellow}}>{i+1}. {item.label}</div>
            <div style={{fontSize:12,color:C.textMuted,lineHeight:1.5,marginTop:2}}>{item.fix}</div>
          </div>)}
        </div>}
        {Object.values(res.results).map((item,i)=><AccordionCard key={i} data={item}/>)}
      </>}
    </div>
  );
}

// ─── 3. Meta Generator ───────────────────────────────────────────────────────
function MetaGenerator() {
  const [topic,setTopic]=useState(""); const [kw,setKw]=useState(""); const [biz,setBiz]=useState("");
  const [res,setRes]=useState(null); const [copied,setCopied]=useState(false);
  const run=()=>{
    if(!topic.trim()) return;
    const t=topic.trim(),k=kw.trim(),b=biz.trim();
    const titles=[
      {text:`${k||t}${b?" — "+b:""} | บริการ${t}คุณภาพ`,note:"keyword นำ + แบรนด์"},
      {text:`${t}: ${k||"บริการคุณภาพ"}${b?" ที่ "+b:""}`,note:"หัวข้อ + keyword"},
      {text:`${k?k+" — ":""}${t}${b?" | "+b:""}`,note:"keyword แรก + หัวข้อ"},
    ].map(x=>({...x,len:x.text.length,ok:x.text.length>=50&&x.text.length<=60}));
    const metas=[
      {text:`${b||t} บริการ${t}${k?" "+k:""} โดยผู้เชี่ยวชาญ ✓ ปรึกษาฟรี ✓ ราคาเหมาะสม ✓ โทรนัดหมายได้เลยวันนี้`,note:"CTA + emoji"},
      {text:`มองหา${t}${k?" "+k:""}อยู่? ${b||t} พร้อมให้บริการ ตอบโจทย์ทุกความต้องการ โทรนัดได้เลย`,note:"คำถาม + solution"},
      {text:`${b||t} ${k||t} ราคาเหมาะสม มีผู้เชี่ยวชาญดูแล ✓ สะดวก ✓ ได้ผลจริง ติดต่อเราวันนี้`,note:"จุดเด่น + CTA"},
    ].map(x=>({...x,len:x.text.length,ok:x.text.length>=150&&x.text.length<=160}));
    setRes({titles,metas,best:{title:titles.find(x=>x.ok)||titles[0],meta:metas.find(x=>x.ok)||metas[0]}});
  };
  const lc=(len,min,max)=>len>=min&&len<=max?C.green:len<min?C.yellow:C.red;
  const copyAll=()=>{if(!res)return;navigator.clipboard.writeText(`Title: ${res.best.title.text}\nMeta: ${res.best.meta.text}`);setCopied(true);setTimeout(()=>setCopied(false),2000);};
  return (
    <div>
      <p style={{color:C.textMuted,fontSize:13,marginBottom:18}}>สร้าง title & meta นับตัวอักษรแม่นยำ</p>
      <label style={lbl}>หัวข้อหน้าเว็บ *</label>
      <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="เช่น บริการฝังเข็ม" style={{...inp,marginBottom:10}}/>
      <label style={lbl}>Keyword หลัก</label>
      <input value={kw} onChange={e=>setKw(e.target.value)} placeholder="เช่น ฝังเข็ม กรุงเทพ" style={{...inp,marginBottom:10}}/>
      <label style={lbl}>ชื่อธุรกิจ</label>
      <input value={biz} onChange={e=>setBiz(e.target.value)} placeholder="เช่น MorKwan TCM" style={{...inp,marginBottom:18}}/>
      <div style={{display:"flex",gap:10}}>
        <Btn onClick={run} label="🏷️ สร้าง Meta Tags"/>

// ─── 4. Content Optimizer ─────────────────────────────────────────────────────
function ContentOptimizer() {
  const [content,setContent]=useState(""); const [kw,setKw]=useState(""); const [res,setRes]=useState(null);
  const run=()=>{
    if(!content.trim()) return;
    const words=content.trim().split(/\s+/).filter(w=>w.length>0);
    const wc=words.length;
    const sentences=content.split(/[.!?\n]+/).filter(s=>s.trim().length>10).length;
    const paragraphs=content.split(/\n\n+/).filter(p=>p.trim().length>0).length;
    const headings=(content.match(/^#{1,3}\s/gm)||[]).length;
    const avgLen=sentences>0?Math.round(wc/sentences):0;
    let kwCount=0,kwPct=0;
    if(kw.trim()){const re=new RegExp(kw.trim().replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");kwCount=(content.match(re)||[]).length;kwPct=wc>0?(kwCount/wc*100):0;}
    const wcS=wc<100?2:wc<300?5:wc<600?7:wc<=2500?10:8;
    const kwS=!kw?7:kwCount===0?0:kwPct>=1&&kwPct<=3?10:kwPct<1?5:kwPct<=5?7:3;
    const stS=headings>=3?10:headings>=1?7:paragraphs>=3?5:3;
    const rdS=avgLen===0?5:avgLen<=15?10:avgLen<=20?8:avgLen<=25?6:4;
    const overall=Math.round((wcS+kwS+stS+rdS)/4);
    const issues=[];
    if(wc<300)issues.push(`เนื้อหาสั้นเกิน (${wc} คำ) ควรมีอย่างน้อย 600 คำ`);
    if(kwCount===0&&kw)issues.push(`ไม่พบ "${kw}" ในเนื้อหาเลย`);
    if(kwPct>3)issues.push(`Keyword density ${kwPct.toFixed(1)}% สูงเกิน (ควร 1-3%)`);
    if(headings===0)issues.push("ไม่มี Heading เลย เพิ่ม ## แบ่งเนื้อหา");
    if(avgLen>25)issues.push(`ประโยคยาวเฉลี่ย ${avgLen} คำ ควรไม่เกิน 20 คำ`);
    setRes({wc,sentences,paragraphs,headings,avgLen,kwCount,kwPct:kwPct.toFixed(2),scores:{wcS,kwS,stS,rdS},overall,issues});
  };
  const oc=res?(res.overall>=7?C.green:res.overall>=5?C.yellow:C.red):C.primary;
  return (
    <div>
      <p style={{color:C.textMuted,fontSize:13,marginBottom:18}}>วิเคราะห์ word count, keyword density, โครงสร้าง</p>
      <label style={lbl}>Target Keyword</label>
      <input value={kw} onChange={e=>setKw(e.target.value)} placeholder="เช่น แพทย์แผนจีน" style={{...inp,marginBottom:10}}/>
      <label style={lbl}>เนื้อหา *</label>
      <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="วางบทความที่นี่..." style={{...inp,height:160,marginBottom:18}}/>
      <Btn onClick={run} label="✍️ วิเคราะห์"/>
      {res&&<>
        <div style={{textAlign:"center",padding:"20px 0 12px"}}>
          <div style={{fontSize:10,color:C.textMuted,letterSpacing:"0.12em",marginBottom:8}}>CONTENT SCORE</div>
          <div style={{fontSize:72,fontWeight:900,color:oc,lineHeight:1}}>{res.overall}</div>
          <div style={{fontSize:14,color:C.textMuted}}>/10</div>
        </div>
        <div style={{...crd,marginBottom:12}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {[["จำนวนคำ",`${res.wc}`,res.wc>=600?C.green:res.wc>=300?C.yellow:C.red],
              ["ประโยค",`${res.sentences}`,C.textMuted],
              ["ย่อหน้า",`${res.paragraphs}`,C.textMuted],
              ["คำ/ประโยค",`${res.avgLen}`,res.avgLen<=20?C.green:C.yellow],
              kw?["Keyword",`${res.kwCount} ครั้ง`,C.textMuted]:null,
              kw?["Density",`${res.kwPct}%`,parseFloat(res.kwPct)>=1&&parseFloat(res.kwPct)<=3?C.green:C.yellow]:null,
            ].filter(Boolean).map(([l,v,c],i)=>(
              <div key={i} style={{background:C.surface,borderRadius:8,padding:"10px 13px"}}>
                <div style={{fontSize:10,color:C.textMuted,marginBottom:3,letterSpacing:"0.06em"}}>{l}</div>
                <div style={{fontSize:16,fontWeight:700,color:c}}>{v}</div>
              </div>
            ))}
          </div>
          <Bar label="ความยาว" score={res.scores.wcS}/>
          <Bar label="Keyword" score={res.scores.kwS}/>
          <Bar label="โครงสร้าง" score={res.scores.stS}/>
          <Bar label="อ่านง่าย" score={res.scores.rdS}/>
        </div>
        {res.issues.length>0&&<div style={{background:`${C.red}10`,border:`1px solid ${C.red}25`,borderRadius:10,padding:"12px 16px"}}>
          <div style={{fontSize:11,color:C.red,fontWeight:700,marginBottom:8,letterSpacing:"0.08em"}}>⚠️ ปัญหาที่พบ</div>
          {res.issues.map((x,i)=><div key={i} style={{fontSize:12,color:C.textMuted,marginBottom:5}}>• {x}</div>)}
        </div>}
      </>}
    </div>
  );
}

function KwDensity({article,kw,wordCount}){
  const kwCount=(article.toLowerCase().match(new RegExp(kw.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g"))||[]).length;
  const density=wordCount>0?((kwCount/wordCount)*100).toFixed(1):0;
  const ok=parseFloat(density)>=1&&parseFloat(density)<=3;
  return <span style={{fontSize:11,fontWeight:700,color:ok?C.green:C.yellow}}>Density: {density}% {ok?"✓":"!"}</span>;
}
async function streamClaude(prompt,maxTokens,onChunk){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens||1500,stream:true,messages:[{role:"user",content:prompt}]})});
  const reader=res.body.getReader();const decoder=new TextDecoder();
  while(true){const{done,value}=await reader.read();if(done)break;const chunk=decoder.decode(value,{stream:true});for(const line of chunk.split("\n")){if(line.startsWith("data: ")){const s=line.slice(6).trim();if(s==="[DONE]")continue;try{const p=JSON.parse(s);if(p.type==="content_block_delta"&&p.delta?.text)onChunk(p.delta.text);}catch{}}}}
}

      {/* Header */}

        <div style={{maxWidth:920,margin:"0 auto",padding:"0 20px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:14,paddingBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:36,height:36,background:`linear-gradient(135deg,${C.primary},#8b5cf6)`,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:`0 0 16px ${C.primaryGlow}`}}>📈</div>
              <div>
                <div style={{fontSize:16,fontWeight:800,letterSpacing:"-0.03em",background:`linear-gradient(90deg,${C.text},#a5b4fc)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>SEO Toolkit</div>
                <div style={{fontSize:10,color:C.textMuted,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:1}}>Professional Edition</div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,background:C.surface,border:`1px solid ${C.border}`,borderRadius:99,padding:"5px 12px"}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:C.green,boxShadow:`0 0 6px ${C.green}`,animation:"pulse 2s infinite"}}/>
              <span style={{fontSize:10,color:C.green,fontWeight:700,letterSpacing:"0.08em"}}>ONLINE</span>
            </div>
          </div>
          <div style={{display:"flex",overflowX:"auto",scrollbarWidth:"none",borderTop:`1px solid ${C.border}`}}>
            {TABS.map((t,i)=>(
              <button key={i} onClick={()=>setTab(i)} style={{
                background:"none",border:"none",
                borderBottom:tab===i?`2px solid ${C.primary}`:"2px solid transparent",
                color:tab===i?"#a5b4fc":C.textMuted,
                padding:"10px 14px",fontSize:12,fontWeight:tab===i?700:400,
                cursor:"pointer",whiteSpace:"nowrap",transition:"color 0.15s",
              }}>{t.icon} {t.name}</button>
            ))}
          </div>
        </div>
      </header>

      {/* Content */}
      <main style={{maxWidth:920,margin:"28px auto 0",padding:"0 20px",animation:"fadeUp 0.3s ease"}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden",boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}}>
          {/* Tool header */}
          <div style={{background:`linear-gradient(180deg,#141a26,${C.card})`,borderBottom:`1px solid ${C.border}`,padding:"20px 28px",display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:44,height:44,background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{TABS[tab].icon}</div>
            <div style={{flex:1}}>
              <h1 style={{fontSize:17,fontWeight:800,color:C.text,letterSpacing:"-0.02em",margin:0}}>{TABS[tab].name}</h1>
              <p style={{fontSize:12,color:C.textMuted,margin:"3px 0 0"}}>{TABS[tab].desc}</p>
            </div>
            <div style={{background:`${C.primary}18`,border:`1px solid ${C.primary}30`,borderRadius:99,padding:"4px 12px",fontSize:10,color:C.primary,fontWeight:700,letterSpacing:"0.06em"}}>
              {tab+1} / {TABS.length}
            </div>
          </div>
          <div style={{padding:"28px"}}><Tool key={tab}/></div>
        </div>
        <div style={{textAlign:"center",padding:"24px 0 0",fontSize:10,color:C.textDim,letterSpacing:"0.1em"}}>
          SEO TOOLKIT • LOGIC-BASED • NO BULLSHIT
        </div>
      </main>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
